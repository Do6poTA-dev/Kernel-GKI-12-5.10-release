name: Build GKI Kernel Zeus

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: 'Kernel name'
        default: 'zeus-NetHunter'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            libncurses5-dev libssl-dev libxml2 libxml2-utils \
            lzop rsync schedtool squashfs-tools zip zlib1g-dev \
            python3 python3-pip binutils-aarch64-linux-gnu

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-gki-5.10-${{ github.sha }}
          restore-keys: ccache-gki-5.10-

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/common \
            -b android12-5.10 kernel/common

      - name: Download Clang toolchain
        run: |
          mkdir -p clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250101-release/Clang-20.0.0git-20250101.tar.gz \
            -O clang.tar.gz
          tar -xf clang.tar.gz -C clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Build kernel
        run: |
          cd kernel/common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
          export CCACHE_DIR=~/.ccache
          export CC="ccache clang"

          mkdir -p out

          make O=out gki_defconfig

          # Отключаем LTO — главная причина таймаута
          scripts/config --file out/.config \
            --disable LTO_CLANG \
            --disable LTO_CLANG_FULL \
            --disable LTO_CLANG_THIN \
            --disable THINLTO \
            --enable USER_NS \
            --enable NET_NS \
            --enable PID_NS \
            --enable VETH \
            --enable VIRTIO_PCI \
            --enable VIRTIO_MMIO \
            --enable VIRTIO_NET \
            --enable VIRTIO_BLK \
            --enable VIRTIO_BALLOON \
            --enable VIRTIO_CONSOLE \
            --enable CFG80211 \
            --enable MAC80211 \
            --enable BT_RFCOMM \
            --enable USB_RAW_GADGET

          make O=out olddefconfig

          # Проверяем что USER_NS включён
          grep "CONFIG_USER_NS" out/.config

          make -j$(nproc) O=out 2>&1 | tee out/build.log

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "=== ERRORS ==="
            grep "error:" out/build.log | head -20
            tail -50 out/build.log
            exit 1
          fi
          echo "=== BUILD SUCCESS ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel/common/out/arch/arm64/boot/Image anykernel/
          cd anykernel
          zip -r9 ../zeus-nethunter-kernel.zip . \
            -x '*.git*' -x '*placeholder*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeus-nethunter-kernel
          path: zeus-nethunter-kernel.zip
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/common/out/build.log
