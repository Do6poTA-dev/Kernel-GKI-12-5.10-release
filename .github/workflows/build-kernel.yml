name: Build Xiaomi SM8450 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Artifact name"
        default: "zeus-NetHunter"
        required: true
      device:
        description: "Device codename: zeus = Xiaomi 12 Pro, cupid = Xiaomi 12"
        default: "zeus"
        required: true
        type: choice
        options:
          - zeus
          - cupid
      lto:
        description: "LTO mode. none is slower to link less often and avoids many CI timeouts."
        default: "none"
        required: true
        type: choice
        options:
          - none
          - thin
      profile:
        description: "Feature profile to apply"
        default: "nethunter"
        required: true
        type: choice
        options:
          - nethunter
          - kvm

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf libncurses5-dev libssl-dev \
            libxml2 libxml2-utils lz4 lzop python-is-python3 python3 \
            python3-pip rsync schedtool squashfs-tools unzip zip zlib1g-dev \
            binutils-aarch64-linux-gnu

      - name: Install repo tool
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "$HOME/bin"
          curl -L --fail https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-sm8450-5.10-${{ inputs.device }}-${{ github.sha }}
          restore-keys: |
            ccache-sm8450-5.10-${{ inputs.device }}-
            ccache-sm8450-5.10-

      - name: Sync Xiaomi SM8450 kernel manifest
        run: |
          mkdir -p kernel-src
          cd kernel-src
          repo init \
            -u https://github.com/xiaomi-sm8450-kernel/manifest.git \
            -b zeus-s-oss \
            --depth=1
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch -j"$(nproc)"

      - name: Apply preventive kernel profile settings
        run: |
          cd kernel-src
          profile="${{ inputs.profile }}"
          fragment_path="common/arch/arm64/configs/zeus_${profile}.fragment"

          test -f build.sh
          test -f kernel_platform/common/build.config.msm.${{ inputs.device }}
          test -d kernel_platform/msm-kernel
          test -d vendor/qcom/opensource/wlan/qcacld-3.0
          test -d vendor/qcom/opensource/touch-drivers
          test -d vendor/qcom/proprietary/audio-devicetree
          test -d vendor/qcom/proprietary/video-devicetree

          case "$profile" in
            nethunter)
              cat > "kernel_platform/${fragment_path}" <<'EOF'
          CONFIG_NAMESPACES=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_USER_NS=y
          CONFIG_NET_NS=y
          CONFIG_PID_NS=y
          CONFIG_PACKET=y
          CONFIG_VETH=y
          CONFIG_BT_RFCOMM=y
          CONFIG_BT_RFCOMM_TTY=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_RAW_GADGET=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_FRAME_WARN=0
          EOF
              ;;
            kvm)
              cat > "kernel_platform/${fragment_path}" <<'EOF'
          CONFIG_VIRTUALIZATION=y
          CONFIG_KVM=y
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_MMIO=y
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_VIRTIO_PCI=y
          CONFIG_VIRTIO_NET=y
          CONFIG_VIRTIO_BLK=y
          CONFIG_VIRTIO_CONSOLE=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_VHOST_NET=y
          CONFIG_VHOST_VSOCK=y
          CONFIG_TUN=y
          CONFIG_VIRTIO_BALLOON=y
          CONFIG_VIRTIO_FS=y
          EOF
              ;;
            *)
              echo "::error::Unsupported profile: ${profile}"
              exit 1
              ;;
          esac

          sed -i '/^export OUT_DIR=/a mkdir -p "${ANDROID_PRODUCT_OUT}"' build.sh
          sed -i "/^export LTO=/i export DEFCONFIG_FRAGMENTS=\"${fragment_path}\"" build.sh
          sed -i 's/^export LTO=.*/export LTO=${{ inputs.lto }}/' build.sh

          # Vendor kernels often fail newer Clang builds because warnings are promoted to errors.
          # This keeps CI focused on real compile failures while preserving the source tree.
          sed -i -E '/^KBUILD_CFLAGS[[:space:]]+\+= -Wframe-larger-than=\$\(CONFIG_FRAME_WARN\)/d' \
            kernel_platform/common/Makefile \
            kernel_platform/msm-kernel/Makefile
          sed -i '/^export LTO=/i export KCFLAGS="${KCFLAGS:-} -Wno-error"' build.sh
          chmod +x build.sh

      - name: Build device kernel
        run: |
          set -o pipefail
          cd kernel-src
          export CCACHE_DIR=~/.ccache
          export USE_CCACHE=1
          export TRIM_NONLISTED_KMI=0
          export KMI_SYMBOL_LIST_STRICT_MODE=0
          bash ./build.sh "${{ inputs.device }}" 2>&1 | tee "build-${{ inputs.device }}.log"

      - name: Sanity check output before packaging
        run: |
          cd kernel-src
          device="${{ inputs.device }}"
          profile="${{ inputs.profile }}"
          out_dir="out/msm-kernel-${device}"
          device_out="device/qcom/${device}-kernel"
          roots=("$out_dir")
          if [ -d "$device_out" ]; then
            roots+=("$device_out")
          fi
          failures=0

          require_find() {
            local label="$1"
            shift
            local root
            local match
            for root in "${roots[@]}"; do
              [ -d "$root" ] || continue
              match="$(find "$root" "$@" -print -quit)"
              if [ -n "$match" ]; then
                echo "Found ${label}: ${match}"
                return 0
              fi
            done
            echo "::error::Missing ${label}. Refusing to package a likely non-bootable kernel."
            failures=$((failures + 1))
          }

          require_config() {
            local pattern="$1"
            local label="$2"
            if ! grep -Eq "$pattern" "$config_file"; then
              echo "::error::Missing ${label} in ${config_file}."
              failures=$((failures + 1))
            fi
          }

          warn_config() {
            local pattern="$1"
            local label="$2"
            if ! grep -Eq "$pattern" "$config_file"; then
              echo "::warning::Missing ${label} in ${config_file}."
            fi
          }

          if [ ! -d "$out_dir" ]; then
            echo "::error::Missing output directory: ${out_dir}"
            exit 1
          fi

          require_find "kernel Image" -type f \( -name Image -o -name Image.lz4 \)
          require_find "device tree output" -type f \( -name '*.dtb' -o -name '*.dtbo' -o -name dtbo.img \)
          require_find "vendor modules or vendor_dlkm output" -type f \( -name '*.ko' -o -name vendor_dlkm.img -o -name vendor_dlkm.modules.load \)

          config_file=""
          for candidate in \
            "$device_out/.config" \
            "$out_dir/msm-kernel/.config" \
            "$out_dir/common/.config" \
            "$out_dir/dist/.config"
          do
            if [ -f "$candidate" ]; then
              config_file="$candidate"
              break
            fi
          done
          if [ -z "$config_file" ]; then
            echo "::error::Missing built .config."
            exit 1
          fi
          echo "Checking kernel config: ${config_file}"

          case "$profile" in
            nethunter)
              require_config '^CONFIG_NET_NS=y$' "CONFIG_NET_NS=y"
              require_config '^CONFIG_PACKET=y$' "CONFIG_PACKET=y"
              require_config '^CONFIG_USB_CONFIGFS=y$' "CONFIG_USB_CONFIGFS=y"
              require_config '^CONFIG_USB_CONFIGFS_F_HID=y$' "CONFIG_USB_CONFIGFS_F_HID=y"
              require_config '^CONFIG_BT_RFCOMM=y$' "CONFIG_BT_RFCOMM=y"
              require_config '^CONFIG_CFG80211=[ym]$' "CONFIG_CFG80211=y or m"
              require_config '^CONFIG_MAC80211=[ym]$' "CONFIG_MAC80211=y or m"
              warn_config '^CONFIG_USER_NS=y$' "CONFIG_USER_NS=y"
              warn_config '^CONFIG_PID_NS=y$' "CONFIG_PID_NS=y"
              ;;
            kvm)
              require_config '^CONFIG_VIRTUALIZATION=y$' "CONFIG_VIRTUALIZATION=y"
              require_config '^CONFIG_KVM=y$' "CONFIG_KVM=y"
              require_config '^CONFIG_VIRTIO=y$' "CONFIG_VIRTIO=y"
              require_config '^CONFIG_VIRTIO_MMIO=y$' "CONFIG_VIRTIO_MMIO=y"
              require_config '^CONFIG_VIRTIO_NET=[ym]$' "CONFIG_VIRTIO_NET=y or m"
              require_config '^CONFIG_VIRTIO_BLK=[ym]$' "CONFIG_VIRTIO_BLK=y or m"
              require_config '^CONFIG_TUN=[ym]$' "CONFIG_TUN=y or m"
              warn_config '^CONFIG_KVM_ARM_HOST=y$' "CONFIG_KVM_ARM_HOST=y"
              warn_config '^CONFIG_KVM_ARM_PMU=y$' "CONFIG_KVM_ARM_PMU=y"
              warn_config '^CONFIG_KVM_MMIO=y$' "CONFIG_KVM_MMIO=y"
              warn_config '^CONFIG_VIRTIO_PCI=[ym]$' "CONFIG_VIRTIO_PCI=y or m"
              warn_config '^CONFIG_VIRTIO_CONSOLE=[ym]$' "CONFIG_VIRTIO_CONSOLE=y or m"
              warn_config '^CONFIG_VIRTIO_INPUT=[ym]$' "CONFIG_VIRTIO_INPUT=y or m"
              warn_config '^CONFIG_VHOST_NET=[ym]$' "CONFIG_VHOST_NET=y or m"
              warn_config '^CONFIG_VHOST_VSOCK=[ym]$' "CONFIG_VHOST_VSOCK=y or m"
              warn_config '^CONFIG_VIRTIO_BALLOON=[ym]$' "CONFIG_VIRTIO_BALLOON=y or m"
              warn_config '^CONFIG_VIRTIO_FS=[ym]$' "CONFIG_VIRTIO_FS=y or m"
              ;;
            *)
              echo "::error::Unsupported profile: ${profile}"
              exit 1
              ;;
          esac

          if [ "$failures" -ne 0 ]; then
            for root in "${roots[@]}"; do
              [ -d "$root" ] || continue
              find "$root" -maxdepth 4 -type f
            done | sort | tail -200
            exit 1
          fi

      - name: Package diagnostic build outputs
        run: |
          cd kernel-src
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-diagnostic"
          mkdir -p "$artifact_dir"

          diagnostic_roots=(out/msm-kernel-${{ inputs.device }})
          if [ -d device/qcom/${{ inputs.device }}-kernel ]; then
            diagnostic_roots+=(device/qcom/${{ inputs.device }}-kernel)
          fi

          find "${diagnostic_roots[@]}" -type f \
            \( -name Image -o -name Image.lz4 -o -name '*.dtb' -o -name '*.dtbo' \
               -o -name dtbo.img -o -name vendor_dlkm.img -o -name '*.ko' \
               -o -name '*.modules.load' -o -name modules.load -o -name modules.blocklist \
               -o -name .config -o -name Module.symvers -o -name System.map \) \
            -exec cp --parents {} "$artifact_dir" \;

          cp "build-${{ inputs.device }}.log" "$artifact_dir/"
          find "$artifact_dir" -type f -printf '%P\t%s bytes\n' | sort > "$artifact_dir/MANIFEST.txt"

          cd "$GITHUB_WORKSPACE/artifacts"
          zip -r9 "${{ inputs.kernel_name }}-${{ inputs.device }}-diagnostic.zip" "${{ inputs.kernel_name }}-${{ inputs.device }}-diagnostic"

      - name: Package Lineage AnyKernel3 flashable zip
        run: |
          device="${{ inputs.device }}"
          kernel_name="${{ inputs.kernel_name }}"
          out_dir="$GITHUB_WORKSPACE/kernel-src/out/msm-kernel-${device}"
          device_out="$GITHUB_WORKSPACE/kernel-src/device/qcom/${device}-kernel"
          flashable_zip="$GITHUB_WORKSPACE/artifacts/${kernel_name}-${device}-lineage-anykernel3.zip"

          rm -rf "$GITHUB_WORKSPACE/anykernel"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$GITHUB_WORKSPACE/anykernel"
          rm -rf "$GITHUB_WORKSPACE/anykernel/.git" "$GITHUB_WORKSPACE/anykernel/.github"

          kernel_image=""
          if [ -d "$device_out" ]; then
            kernel_image="$(find "$device_out" -type f -name Image.lz4 | sort | head -n 1)"
          fi
          if [ -z "$kernel_image" ]; then
            kernel_image="$(find "$out_dir" -type f -name Image.lz4 | sort | head -n 1)"
          fi
          if [ -z "$kernel_image" ]; then
            if [ -d "$device_out" ]; then
              kernel_image="$(find "$device_out" -type f -name Image | sort | head -n 1)"
            fi
          fi
          if [ -z "$kernel_image" ]; then
            kernel_image="$(find "$out_dir" -type f -name Image | sort | head -n 1)"
          fi
          if [ -z "$kernel_image" ]; then
            echo "::error::Missing Image/Image.lz4 for AnyKernel3 package."
            exit 1
          fi
          cp "$kernel_image" "$GITHUB_WORKSPACE/anykernel/$(basename "$kernel_image")"

          if [ "$device" = "zeus" ]; then
            pretty_device="Xiaomi 12 Pro"
          else
            pretty_device="Xiaomi 12"
          fi

          cat > "$GITHUB_WORKSPACE/anykernel/anykernel.sh" <<EOF
          #!/sbin/sh
          #
          # AnyKernel3 script for LineageOS on Xiaomi SM8450.

          properties() { '
          kernel.string=${kernel_name} for LineageOS (${device})
          do.devicecheck=1
          do.modules=0
          do.systemless=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=${device}
          device.name2=${pretty_device}
          supported.versions=
          supported.patchlevels=
          '; }

          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;

          . tools/ak3-core.sh;

          dump_boot;
          write_boot;
          EOF

          cd "$GITHUB_WORKSPACE/anykernel"
          zip -r9 "$flashable_zip" . \
            -x '*.git*' -x 'README.md' -x '*placeholder*'

      - name: Upload Lineage flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.device }}-lineage-anykernel3
          path: artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-lineage-anykernel3.zip
          retention-days: 7

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.device }}-diagnostic
          path: artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-diagnostic.zip
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ inputs.device }}
          path: |
            kernel-src/build-*.log
            kernel-src/out/**/*.log
          retention-days: 7
