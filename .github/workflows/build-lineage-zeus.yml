name: Build Lineage-Matched Zeus Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Artifact name"
        default: "zeus-LineageBaseline"
        required: true
      device:
        description: "Device codename"
        default: "zeus"
        required: true
        type: choice
        options:
          - zeus
      profile:
        description: "Feature profile. Start with baseline before flashing any lite profile."
        default: "baseline"
        required: true
        type: choice
        options:
          - baseline
          - kvm-lite
          - kvm-el2-probe
          - nethunter-lite
          - nethunter-cgroup-pids
          - nethunter-cgroup-device
          - nethunter-cgroup
          - nethunter-pidns
          - nethunter-ipcns
          - nethunter-pidipc
          - nethunter-userns
          - nethunter-docker-nopids
          - nethunter-docker-min
          - nethunter-bridge-nf
          - nethunter-rootns
          - nethunter-rootns-ksu
      lto_mode:
        description: "LTO mode. thin is CI-friendly; stock-full matches the phone config but can exceed runner resources."
        default: "thin"
        required: true
        type: choice
        options:
          - thin
          - stock-full
      toolchain:
        description: "Compiler toolchain. android-r563880c matches LineageOS 23.2-20260414 stock config."
        default: "android-r563880c"
        required: true
        type: choice
        options:
          - android-r563880c
          - zyc-21
      build_external_modules:
        description: "Build Lineage SM8450 external module stack for matching vendor_dlkm experiments."
        default: true
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex git libelf-dev \
            libncurses5-dev libssl-dev lz4 python-is-python3 python3 \
            rsync unzip wget zip zlib1g-dev

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-lineage-sm8450-5.10-${{ inputs.device }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-${{ github.sha }}
          restore-keys: |
            ccache-lineage-sm8450-5.10-${{ inputs.device }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-
            ccache-lineage-sm8450-5.10-${{ inputs.device }}-${{ inputs.toolchain }}-
            ccache-lineage-sm8450-5.10-

      - name: Download Clang toolchain
        run: |
          set -euo pipefail
          toolchain="${{ inputs.toolchain }}"
          mkdir -p clang
          case "$toolchain" in
            android-r563880c)
              git clone --depth=1 --filter=blob:none --sparse \
                -b mirror-goog-llvm-r584948-release \
                https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
                android-clang
              cd android-clang
              git sparse-checkout set clang-r563880c
              echo "$GITHUB_WORKSPACE/android-clang/clang-r563880c/bin" >> "$GITHUB_PATH"
              "$GITHUB_WORKSPACE/android-clang/clang-r563880c/bin/clang" --version
              ;;
            zyc-21)
              wget -q \
                https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250715-release/Clang-21.0.0git-20250715.tar.gz \
                -O clang.tar.gz
              tar -xf clang.tar.gz -C clang
              echo "$GITHUB_WORKSPACE/clang/bin" >> "$GITHUB_PATH"
              "$GITHUB_WORKSPACE/clang/bin/clang" --version
              ;;
            *)
              echo "::error::Unsupported toolchain: ${toolchain}"
              exit 1
              ;;
          esac

      - name: Clone LineageOS SM8450 kernel
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git \
            -b lineage-23.2 \
            kernel-src

      - name: Clone LineageOS SM8450 external modules
        if: ${{ inputs.build_external_modules }}
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_kernel_xiaomi_sm8450-modules.git \
            -b lineage-23.2 \
            sm8450-modules

      - name: Integrate KernelSU Next
        if: ${{ inputs.profile == 'nethunter-rootns-ksu' }}
        run: |
          set -euo pipefail
          cd kernel-src
          curl -LSs \
            https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh \
            -o /tmp/kernelsu-next-setup.sh
          sh /tmp/kernelsu-next-setup.sh stable
          test -d KernelSU-Next
          test -L drivers/kernelsu
          grep -q 'CONFIG_KSU' drivers/Makefile
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig

      - name: Apply Lineage stock config
        run: |
          set -euo pipefail
          cd kernel-src
          profile="${{ inputs.profile }}"
          lto_mode="${{ inputs.lto_mode }}"
          mkdir -p out
          cp "$GITHUB_WORKSPACE/configs/zeus-lineage-23.2-20260414.config" out/.config

          case "$profile" in
            baseline|kvm-lite)
              echo "Using stock Lineage config without feature changes for ${profile}."
              ;;
            kvm-el2-probe)
              echo "Applying experimental KVM EL2 probe settings."
              scripts/config --file out/.config \
                --set-str CMDLINE "stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure cgroup.memory=nokmem" \
                --enable VIRTUALIZATION \
                --enable KVM \
                --enable KVM_MMIO \
                --enable VIRTIO \
                --enable VIRTIO_MENU \
                --enable VIRTIO_MMIO \
                --enable VIRTIO_NET \
                --enable VIRTIO_BLK \
                --enable VIRTIO_CONSOLE \
                --enable VIRTIO_INPUT \
                --enable VIRTIO_BALLOON \
                --enable VHOST \
                --enable VHOST_MENU \
                --enable VHOST_NET \
                --enable VHOST_VSOCK \
                --enable TUN
              ;;
            nethunter-lite)
              scripts/config --file out/.config --enable USB_RAW_GADGET
              ;;
            nethunter-cgroup-pids)
              echo "Applying NetHunter cgroup pids-only Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable CGROUP_PIDS
              ;;
            nethunter-cgroup-device)
              echo "Applying NetHunter cgroup device-only Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable CGROUP_DEVICE
              ;;
            nethunter-cgroup)
              echo "Applying NetHunter cgroup-only Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable CGROUP_PIDS \
                --enable CGROUP_DEVICE
              ;;
            nethunter-pidns)
              echo "Applying NetHunter PID namespace-only Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable PID_NS
              ;;
            nethunter-ipcns)
              echo "Applying NetHunter IPC namespace-only Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable POSIX_MQUEUE \
                --enable IPC_NS
              ;;
            nethunter-pidipc)
              echo "Applying NetHunter PID/IPC namespace Docker probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable PID_NS \
                --enable IPC_NS \
                --enable UTS_NS \
                --enable POSIX_MQUEUE
              ;;
            nethunter-userns)
              echo "Applying NetHunter USER namespace probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable USER_NS
              ;;
            nethunter-docker-min)
              echo "Applying minimal rootful Docker settings without USER_NS or bridge netfilter."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable PID_NS \
                --enable IPC_NS \
                --enable UTS_NS \
                --enable POSIX_MQUEUE \
                --enable CGROUP_PIDS \
                --enable CGROUP_DEVICE
              ;;
            nethunter-docker-nopids)
              echo "Applying rootful Docker settings without USER_NS, bridge netfilter, or CGROUP_PIDS."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable PID_NS \
                --enable IPC_NS \
                --enable UTS_NS \
                --enable POSIX_MQUEUE \
                --enable CGROUP_DEVICE
              ;;
            nethunter-bridge-nf)
              echo "Applying NetHunter bridge netfilter probe settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable BRIDGE \
                --enable BRIDGE_NETFILTER
              ;;
            nethunter-rootns)
              echo "Applying experimental NetHunter + root namespace settings without KernelSU."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable USER_NS \
                --enable PID_NS \
                --enable IPC_NS \
                --enable UTS_NS \
                --enable NET_NS \
                --enable POSIX_MQUEUE \
                --enable CGROUP_PIDS \
                --enable CGROUP_DEVICE \
                --enable VETH \
                --enable BRIDGE \
                --enable BRIDGE_NETFILTER \
                --enable OVERLAY_FS
              ;;
            nethunter-rootns-ksu)
              echo "Applying experimental NetHunter + root namespaces + KernelSU settings."
              scripts/config --file out/.config \
                --enable USB_RAW_GADGET \
                --enable USER_NS \
                --enable PID_NS \
                --enable IPC_NS \
                --enable UTS_NS \
                --enable NET_NS \
                --enable POSIX_MQUEUE \
                --enable CGROUP_PIDS \
                --enable CGROUP_DEVICE \
                --enable VETH \
                --enable BRIDGE \
                --enable BRIDGE_NETFILTER \
                --enable OVERLAY_FS \
                --enable KPROBES \
                --enable KALLSYMS \
                --enable KALLSYMS_ALL \
                --enable KSU
              ;;
            *)
              echo "::error::Unsupported profile: ${profile}"
              exit 1
              ;;
          esac

          case "$lto_mode" in
            stock-full)
              echo "Keeping stock full LTO/CFI settings."
              ;;
            thin)
              echo "Switching from stock full LTO to ThinLTO to fit GitHub Actions runners."
              scripts/config --file out/.config \
                --enable LTO \
                --enable LTO_CLANG \
                --disable LTO_CLANG_FULL \
                --enable LTO_CLANG_THIN \
                --disable LTO_NONE \
                --enable CFI_CLANG \
                --enable CFI_CLANG_SHADOW
              ;;
            *)
              echo "::error::Unsupported lto_mode: ${lto_mode}"
              exit 1
              ;;
          esac

      - name: Build Lineage-matched kernel
        run: |
          set -euo pipefail
          cd kernel-src
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export CCACHE_DIR=~/.ccache
          export KBUILD_BUILD_USER=github-actions
          export KBUILD_BUILD_HOST=lineage-zeus

          clang --version | tee out/clang-version.txt
          make O=out olddefconfig
          make -j"$(nproc)" O=out Image.lz4 modules 2>&1 | tee out/build-zeus-lineage.log

      - name: Build Lineage SM8450 external modules
        if: ${{ inputs.build_external_modules }}
        run: |
          set -euo pipefail
          cd kernel-src
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export CCACHE_DIR=~/.ccache
          export KBUILD_BUILD_USER=github-actions
          export KBUILD_BUILD_HOST=lineage-zeus

          modules_src="$GITHUB_WORKSPACE/sm8450-modules"
          if [ ! -d "$modules_src" ]; then
            echo "::error::Missing external module source tree: $modules_src"
            exit 1
          fi

          # Qualcomm module makefiles expect Android's relative kernel layout:
          # kernel/xiaomi/sm8450 plus sibling sm8450-modules, with several
          # Module.symvers lookups rooted under OUT/obj.
          export OUT="$GITHUB_WORKSPACE/kernel-out"
          export OUT_DIR="$PWD/out"
          mkdir -p "$OUT/obj/vendor/qcom/opensource"
          ln -sfn "$modules_src" "$PWD/sm8450-modules"
          ln -sfn "$modules_src" "$OUT/obj/sm8450-modules"
          ln -sfn "$modules_src/qcom/opensource/audio-kernel" \
            "$OUT/obj/vendor/qcom/opensource/audio-kernel"

          python3 - <<'PY'
          import os
          from pathlib import Path

          modules_src = Path(os.environ["GITHUB_WORKSPACE"]) / "sm8450-modules"
          for makefile in (modules_src / "qcom/opensource/datarmnet-ext").glob("*/Makefile"):
              text = makefile.read_text()
              lines = []
              changed = False
              for line in text.splitlines():
                  if "$(MAKE)" in line and " modules $(KBUILD_OPTIONS)" in line:
                      line = line.replace(" $(KBUILD_EXTRA_SYMBOLS)", "")
                      if "KBUILD_EXTRA_SYMBOLS=" not in line:
                          line += ' KBUILD_EXTRA_SYMBOLS="$(KBUILD_EXTRA_SYMBOLS)"'
                      changed = True
                  lines.append(line)
              if changed:
                  makefile.write_text("\n".join(lines) + "\n")
                  print(f"Patched datarmnet external module symvers forwarding: {makefile}")
          PY

          build_ext_module() {
            local rel="$1"
            echo "=== Building external module stack: ${rel} ===" | tee -a out/build-zeus-lineage.log
            make -j"$(nproc)" -C "$modules_src/$rel" \
              O="$PWD/out" \
              M="../sm8450-modules/$rel" \
              KERNEL_SRC="$PWD" \
              OUT="$OUT" \
              OUT_DIR="$OUT_DIR" \
              ARCH="$ARCH" \
              LLVM="$LLVM" \
              LLVM_IAS="$LLVM_IAS" \
              2>&1 | tee -a out/build-zeus-lineage.log
          }

          # Keep this in Lineage BoardConfig order, with dependency roots first.
          external_modules=(
            qcom/opensource/mmrm-driver
            qcom/opensource/audio-kernel
            qcom/opensource/camera-kernel
            qcom/opensource/cvp-kernel
            qcom/opensource/dataipa/drivers/platform/msm
            qcom/opensource/datarmnet/core
            qcom/opensource/datarmnet-ext/aps
            qcom/opensource/datarmnet-ext/offload
            qcom/opensource/datarmnet-ext/shs
            qcom/opensource/datarmnet-ext/perf
            qcom/opensource/datarmnet-ext/perf_tether
            qcom/opensource/datarmnet-ext/sch
            qcom/opensource/datarmnet-ext/wlan
            qcom/opensource/display-drivers/msm
            qcom/opensource/eva-kernel
            qcom/opensource/video-driver
            qcom/opensource/wlan/qcacld-3.0/.qca6490
            qcom/opensource/wlan/qcacld-3.0/.qca6750
          )

          for rel in "${external_modules[@]}"; do
            build_ext_module "$rel"
          done

          find "$modules_src" -type f -name '*.ko' -printf '%P\n' | sort > out/external-modules.paths
          find "$modules_src" -type f -name '*.ko' -printf '%f\n' | sort > out/external-modules.names

          required_external_modules=(
            adsp_loader_dlkm.ko
            audio_pkt_dlkm.ko
            audio_prm_dlkm.ko
            audpkt_ion_dlkm.ko
            aw882xx_dlkm.ko
            camera.ko
            cs35l41_dlkm.ko
            cs35l43_dlkm.ko
            gpr_dlkm.ko
            gsim.ko
            hdmi_dlkm.ko
            ipa_clientsm.ko
            ipam.ko
            ipanetm.ko
            lpass_cdc_dlkm.ko
            lpass_cdc_rx_macro_dlkm.ko
            lpass_cdc_tx_macro_dlkm.ko
            lpass_cdc_va_macro_dlkm.ko
            lpass_cdc_wsa2_macro_dlkm.ko
            lpass_cdc_wsa_macro_dlkm.ko
            machine_dlkm.ko
            mbhc_dlkm.ko
            msm-cvp.ko
            msm-eva.ko
            msm-mmrm.ko
            msm_drm.ko
            msm_video.ko
            pinctrl_lpi_dlkm.ko
            q6_dlkm.ko
            q6_notifier_dlkm.ko
            q6_pdr_dlkm.ko
            qca_cld3_qca6490.ko
            qca_cld3_qca6750.ko
            rmnet_aps.ko
            rmnet_core.ko
            rmnet_ctl.ko
            rmnet_offload.ko
            rmnet_perf.ko
            rmnet_perf_tether.ko
            rmnet_sch.ko
            rmnet_shs.ko
            rmnet_wlan.ko
            rndisipam.ko
            snd_event_dlkm.ko
            spf_core_dlkm.ko
            stub_dlkm.ko
            swr_ctrl_dlkm.ko
            swr_dlkm.ko
            swr_dmic_dlkm.ko
            swr_haptics_dlkm.ko
            wcd937x_dlkm.ko
            wcd937x_slave_dlkm.ko
            wcd938x_dlkm.ko
            wcd938x_slave_dlkm.ko
            wcd9xxx_dlkm.ko
            wcd_core_dlkm.ko
            wsa881x_dlkm.ko
            wsa883x_dlkm.ko
          )

          missing=0
          for name in "${required_external_modules[@]}"; do
            if ! find "$modules_src" -type f -name "$name" -print -quit | grep -q .; then
              echo "::error::External module did not build: $name"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Sanity check Lineage-matched output
        run: |
          set -euo pipefail
          cd kernel-src
          profile="${{ inputs.profile }}"
          lto_mode="${{ inputs.lto_mode }}"
          toolchain="${{ inputs.toolchain }}"
          config_file="out/.config"
          stock_config="$GITHUB_WORKSPACE/configs/zeus-lineage-23.2-20260414.config"
          image_lz4="out/arch/arm64/boot/Image.lz4"
          image="out/arch/arm64/boot/Image"
          failures=0

          fail() {
            echo "::error::$1"
            failures=$((failures + 1))
          }

          warn() {
            echo "::warning::$1"
          }

          grep -Eq '^VERSION = 5$' Makefile || fail "Kernel VERSION is not 5."
          grep -Eq '^PATCHLEVEL = 10$' Makefile || fail "Kernel PATCHLEVEL is not 10."
          grep -Eq '^SUBLEVEL = 252$' Makefile || fail "Kernel SUBLEVEL is not 252."
          [ -f "$image" ] || fail "Missing Image."
          [ -f "$image_lz4" ] || fail "Missing Image.lz4."
          grep -Eq 'clang version 21\.' out/clang-version.txt || fail "Compiler is not Clang 21-class."
          case "$toolchain" in
            android-r563880c)
              grep -Fq 'Android (14054515' out/clang-version.txt || fail "Compiler is not Android clang build 14054515."
              ;;
            zyc-21)
              grep -Fq 'ZyC clang version 21' out/clang-version.txt || fail "Compiler is not ZyC Clang 21."
              ;;
            *)
              fail "Unsupported toolchain: ${toolchain}"
              ;;
          esac
          grep -Eq '^CONFIG_LOCALVERSION="-gki"$' "$config_file" || fail 'CONFIG_LOCALVERSION="-gki" is missing.'
          grep -Eq '^CONFIG_LTO=y$' "$config_file" || fail "CONFIG_LTO=y is missing."
          grep -Eq '^CONFIG_LTO_CLANG=y$' "$config_file" || fail "CONFIG_LTO_CLANG=y is missing."
          grep -Eq '^CONFIG_CFI_CLANG=y$' "$config_file" || fail "CONFIG_CFI_CLANG=y is missing."
          grep -Eq '^CONFIG_CFI_CLANG_SHADOW=y$' "$config_file" || fail "CONFIG_CFI_CLANG_SHADOW=y is missing."

          case "$lto_mode" in
            stock-full)
              grep -Eq '^CONFIG_LTO_CLANG_FULL=y$' "$config_file" || fail "CONFIG_LTO_CLANG_FULL=y is missing."
              ;;
            thin)
              grep -Eq '^CONFIG_LTO_CLANG_THIN=y$' "$config_file" || fail "CONFIG_LTO_CLANG_THIN=y is missing."
              if grep -Eq '^CONFIG_LTO_CLANG_FULL=y$' "$config_file"; then
                fail "ThinLTO mode unexpectedly kept CONFIG_LTO_CLANG_FULL=y."
              fi
              ;;
            *)
              fail "Unsupported lto_mode: ${lto_mode}"
              ;;
          esac

          case "$profile" in
            baseline)
              ;;
            kvm-lite)
              grep -Eq '^CONFIG_KVM=y$' "$config_file" || fail "CONFIG_KVM=y is missing."
              grep -Eq '^CONFIG_VIRTIO=y$' "$config_file" || fail "CONFIG_VIRTIO=y is missing."
              grep -Eq '^CONFIG_TUN=y$' "$config_file" || fail "CONFIG_TUN=y is missing."
              ;;
            kvm-el2-probe)
              grep -Eq '^CONFIG_KVM=y$' "$config_file" || fail "CONFIG_KVM=y is missing."
              grep -Eq '^CONFIG_VIRTUALIZATION=y$' "$config_file" || fail "CONFIG_VIRTUALIZATION=y is missing."
              grep -Eq '^CONFIG_CMDLINE=.*kvm-arm.mode=nvhe' "$config_file" || fail "CONFIG_CMDLINE does not request kvm-arm.mode=nvhe."
              grep -Eq '^CONFIG_VIRTIO=y$' "$config_file" || fail "CONFIG_VIRTIO=y is missing."
              grep -Eq '^CONFIG_VIRTIO_MMIO=y$' "$config_file" || fail "CONFIG_VIRTIO_MMIO=y is missing."
              grep -Eq '^CONFIG_VHOST=y$' "$config_file" || fail "CONFIG_VHOST=y is missing."
              grep -Eq '^CONFIG_VHOST_NET=y$' "$config_file" || fail "CONFIG_VHOST_NET=y is missing."
              grep -Eq '^CONFIG_TUN=y$' "$config_file" || fail "CONFIG_TUN=y is missing."
              ;;
            nethunter-lite)
              grep -Eq '^CONFIG_NET_NS=y$' "$config_file" || fail "CONFIG_NET_NS=y is missing."
              grep -Eq '^CONFIG_PACKET=y$' "$config_file" || fail "CONFIG_PACKET=y is missing."
              grep -Eq '^CONFIG_VETH=y$' "$config_file" || fail "CONFIG_VETH=y is missing."
              grep -Eq '^CONFIG_BT_RFCOMM=y$' "$config_file" || fail "CONFIG_BT_RFCOMM=y is missing."
              grep -Eq '^CONFIG_BT_RFCOMM_TTY=y$' "$config_file" || fail "CONFIG_BT_RFCOMM_TTY=y is missing."
              grep -Eq '^CONFIG_USB_CONFIGFS=y$' "$config_file" || fail "CONFIG_USB_CONFIGFS=y is missing."
              grep -Eq '^CONFIG_USB_CONFIGFS_F_HID=y$' "$config_file" || fail "CONFIG_USB_CONFIGFS_F_HID=y is missing."
              grep -Eq '^CONFIG_CFG80211=m$' "$config_file" || fail "CONFIG_CFG80211=m is missing."
              grep -Eq '^CONFIG_MAC80211=m$' "$config_file" || fail "CONFIG_MAC80211=m is missing."
              if ! grep -Eq '^CONFIG_USB_RAW_GADGET=y$' "$config_file"; then
                warn "CONFIG_USB_RAW_GADGET was requested but not enabled by olddefconfig."
              fi
              if grep -Eq '^CONFIG_USER_NS=y$|^CONFIG_PID_NS=y$' "$config_file"; then
                fail "nethunter-lite must not force CONFIG_USER_NS or CONFIG_PID_NS."
              fi
              ;;
            nethunter-cgroup-pids)
              grep -Eq '^CONFIG_CGROUP_PIDS=y$' "$config_file" || fail "CONFIG_CGROUP_PIDS=y is missing."
              if grep -Eq '^CONFIG_CGROUP_DEVICE=y$|^CONFIG_USER_NS=y$|^CONFIG_PID_NS=y$|^CONFIG_IPC_NS=y$|^CONFIG_BRIDGE_NETFILTER=y$|^CONFIG_KSU=y$' "$config_file"; then
                fail "nethunter-cgroup-pids enabled an unrelated high-risk option."
              fi
              if ! grep -Eq '^CONFIG_USB_RAW_GADGET=y$' "$config_file"; then
                warn "CONFIG_USB_RAW_GADGET was requested but not enabled by olddefconfig."
              fi
              ;;
            nethunter-cgroup-device)
              grep -Eq '^CONFIG_CGROUP_DEVICE=y$' "$config_file" || fail "CONFIG_CGROUP_DEVICE=y is missing."
              if grep -Eq '^CONFIG_CGROUP_PIDS=y$|^CONFIG_USER_NS=y$|^CONFIG_PID_NS=y$|^CONFIG_IPC_NS=y$|^CONFIG_BRIDGE_NETFILTER=y$|^CONFIG_KSU=y$' "$config_file"; then
                fail "nethunter-cgroup-device enabled an unrelated high-risk option."
              fi
              if ! grep -Eq '^CONFIG_USB_RAW_GADGET=y$' "$config_file"; then
                warn "CONFIG_USB_RAW_GADGET was requested but not enabled by olddefconfig."
              fi
              ;;
            nethunter-cgroup)
