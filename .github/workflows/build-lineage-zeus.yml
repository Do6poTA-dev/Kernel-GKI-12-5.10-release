            nethunter-rootns-ksu)
              grep -Eq '^CONFIG_KSU=y$' "$config_file" || fail "CONFIG_KSU=y is missing."
              grep -Eq '^CONFIG_KPROBES=y$' "$config_file" || fail "CONFIG_KPROBES=y is missing."
              grep -Eq '^CONFIG_USER_NS=y$' "$config_file" || fail "CONFIG_USER_NS=y is missing."
              grep -Eq '^CONFIG_PID_NS=y$' "$config_file" || fail "CONFIG_PID_NS=y is missing."
              grep -Eq '^CONFIG_IPC_NS=y$' "$config_file" || fail "CONFIG_IPC_NS=y is missing."
              grep -Eq '^CONFIG_UTS_NS=y$' "$config_file" || fail "CONFIG_UTS_NS=y is missing."
              grep -Eq '^CONFIG_NET_NS=y$' "$config_file" || fail "CONFIG_NET_NS=y is missing."
              grep -Eq '^CONFIG_POSIX_MQUEUE=y$' "$config_file" || fail "CONFIG_POSIX_MQUEUE=y is missing."
              grep -Eq '^CONFIG_CGROUP_PIDS=y$' "$config_file" || fail "CONFIG_CGROUP_PIDS=y is missing."
              grep -Eq '^CONFIG_CGROUP_DEVICE=y$' "$config_file" || fail "CONFIG_CGROUP_DEVICE=y is missing."
              grep -Eq '^CONFIG_OVERLAY_FS=y$' "$config_file" || fail "CONFIG_OVERLAY_FS=y is missing."
              grep -Eq '^CONFIG_BRIDGE_NETFILTER=y$' "$config_file" || fail "CONFIG_BRIDGE_NETFILTER=y is missing."
              grep -Eq '^CONFIG_VETH=y$' "$config_file" || fail "CONFIG_VETH=y is missing."
              grep -Eq '^CONFIG_BT_RFCOMM=y$' "$config_file" || fail "CONFIG_BT_RFCOMM=y is missing."
              grep -Eq '^CONFIG_BT_RFCOMM_TTY=y$' "$config_file" || fail "CONFIG_BT_RFCOMM_TTY=y is missing."
              grep -Eq '^CONFIG_USB_CONFIGFS_F_HID=y$' "$config_file" || fail "CONFIG_USB_CONFIGFS_F_HID=y is missing."
              if ! grep -Eq '^CONFIG_USB_RAW_GADGET=y$' "$config_file"; then
                warn "CONFIG_USB_RAW_GADGET was requested but not enabled by olddefconfig."
              fi
              ;;
            *)
              fail "Unsupported profile: ${profile}"
              ;;
          esac

          python3 - "$stock_config" "$config_file" "$profile" "$lto_mode" <<'PY'
          import sys
          from pathlib import Path

          stock_path = Path(sys.argv[1])
          built_path = Path(sys.argv[2])
          profile = sys.argv[3]
          lto_mode = sys.argv[4]

          ignore_prefixes = (
              "CONFIG_CC_",
              "CONFIG_AS_",
              "CONFIG_LD_",
              "CONFIG_LLD_",
          )
          ignore_exact = {
              "CONFIG_CLANG_VERSION",
              "CONFIG_GCC_VERSION",
              "CONFIG_TOOLS_SUPPORT_RELR",
              "CONFIG_BUILD_SALT",
          }
          profile_allowed = {
              "baseline": set(),
              "kvm-lite": set(),
              "kvm-el2-probe": {
                  "CONFIG_CMDLINE",
                  "CONFIG_VIRTIO_BLK",
                  "CONFIG_VIRTIO_NET",
                  "CONFIG_VIRTIO_CONSOLE",
                  "CONFIG_VIRTIO_BALLOON",
                  "CONFIG_VIRTIO_INPUT",
                  "CONFIG_VIRTIO_MMIO",
                  "CONFIG_VHOST_NET",
              },
              "nethunter-lite": {"CONFIG_USB_RAW_GADGET"},
              "nethunter-cgroup-pids": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_CGROUP_PIDS",
              },
              "nethunter-cgroup-device": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_CGROUP_DEVICE",
              },
              "nethunter-cgroup": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_CGROUP_PIDS",
                  "CONFIG_CGROUP_DEVICE",
              },
              "nethunter-pidns": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_PID_NS",
              },
              "nethunter-ipcns": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
              },
              "nethunter-pidipc": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_PID_NS",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
              },
              "nethunter-userns": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_USER_NS",
              },
              "nethunter-docker-min": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_PID_NS",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
                  "CONFIG_CGROUP_PIDS",
                  "CONFIG_CGROUP_DEVICE",
              },
              "nethunter-docker-nopids": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_PID_NS",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
                  "CONFIG_CGROUP_DEVICE",
              },
              "nethunter-bridge-nf": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_BRIDGE_NETFILTER",
                  "CONFIG_NETFILTER_FAMILY_BRIDGE",
                  "CONFIG_NF_CONNTRACK_BRIDGE",
              },
              "nethunter-rootns": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_USER_NS",
                  "CONFIG_PID_NS",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
                  "CONFIG_CGROUP_PIDS",
                  "CONFIG_CGROUP_DEVICE",
                  "CONFIG_BRIDGE_NETFILTER",
                  "CONFIG_NETFILTER_FAMILY_BRIDGE",
                  "CONFIG_NF_CONNTRACK_BRIDGE",
              },
              "nethunter-rootns-ksu": {
                  "CONFIG_USB_RAW_GADGET",
                  "CONFIG_USER_NS",
                  "CONFIG_PID_NS",
                  "CONFIG_IPC_NS",
                  "CONFIG_POSIX_MQUEUE",
                  "CONFIG_CGROUP_PIDS",
                  "CONFIG_CGROUP_DEVICE",
                  "CONFIG_BRIDGE_NETFILTER",
                  "CONFIG_NETFILTER_FAMILY_BRIDGE",
                  "CONFIG_NF_CONNTRACK_BRIDGE",
              },
          }
          profile_allowed_prefixes = {
              "baseline": (),
              "kvm-lite": (),
              "kvm-el2-probe": (),
              "nethunter-lite": (),
              "nethunter-cgroup-pids": (),
              "nethunter-cgroup-device": (),
              "nethunter-cgroup": (),
              "nethunter-pidns": (),
              "nethunter-ipcns": (),
              "nethunter-pidipc": (),
              "nethunter-userns": (),
              "nethunter-docker-nopids": (),
              "nethunter-docker-min": (),
              "nethunter-bridge-nf": (),
              "nethunter-rootns": (),
              "nethunter-rootns-ksu": ("CONFIG_KSU",),
          }
          lto_allowed = {
              "stock-full": set(),
              "thin": {"CONFIG_LTO_CLANG_FULL", "CONFIG_LTO_CLANG_THIN"},
          }
          max_unexpected = {
              "baseline": 25,
              "kvm-lite": 25,
              "kvm-el2-probe": 35,
              "nethunter-lite": 35,
              "nethunter-cgroup-pids": 35,
              "nethunter-cgroup-device": 35,
              "nethunter-cgroup": 35,
              "nethunter-pidns": 35,
              "nethunter-ipcns": 35,
              "nethunter-pidipc": 35,
              "nethunter-userns": 35,
              "nethunter-docker-nopids": 35,
              "nethunter-docker-min": 35,
              "nethunter-bridge-nf": 35,
              "nethunter-rootns": 45,
              "nethunter-rootns-ksu": 80,
          }[profile]

          def parse(path):
              data = {}
              for line in path.read_text(errors="ignore").splitlines():
                  if line.startswith("CONFIG_") and "=" in line:
                      key, value = line.split("=", 1)
                      data[key] = value
                  elif line.startswith("# CONFIG_") and line.endswith(" is not set"):
                      key = line[len("# "):].split()[0]
                      data[key] = "n"
              return data

          stock = parse(stock_path)
          built = parse(built_path)
          unexpected = []
          for key in sorted(set(stock) | set(built)):
              if stock.get(key) == built.get(key):
                  continue
              if key in ignore_exact or key.startswith(ignore_prefixes):
                  continue
              if key in profile_allowed[profile]:
                  continue
              if any(key.startswith(prefix) for prefix in profile_allowed_prefixes[profile]):
                  continue
              if key in lto_allowed[lto_mode]:
                  continue
              unexpected.append((key, stock.get(key), built.get(key)))

          print(f"Unexpected config differences: {len(unexpected)}")
          for key, stock_value, built_value in unexpected[:120]:
              print(f"{key}: stock={stock_value} built={built_value}")
          if len(unexpected) > max_unexpected:
              raise SystemExit(1)
          PY

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Package diagnostic build outputs
        run: |
          set -euo pipefail
          cd kernel-src
          artifact_slug="${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}"
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${artifact_slug}-diagnostic"
          mkdir -p "$artifact_dir"
          cp out/.config "$artifact_dir/built.config"
          cp "$GITHUB_WORKSPACE/configs/zeus-lineage-23.2-20260414.config" "$artifact_dir/stock.config"
          cp out/clang-version.txt "$artifact_dir/"
          cp out/build-zeus-lineage.log "$artifact_dir/"
          cp out/arch/arm64/boot/Image.lz4 "$artifact_dir/"
          if [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image "$artifact_dir/"
          fi
          find out -type f -name '*.ko' -printf '%P\n' | sort > "$artifact_dir/built-modules.paths"
          find out -type f -name '*.ko' -printf '%f\n' | sort > "$artifact_dir/built-modules.names"
          if [ -f out/Module.symvers ]; then
            cp out/Module.symvers "$artifact_dir/"
          fi
          if [ -f out/modules.order ]; then
            cp out/modules.order "$artifact_dir/"
          fi
          if [ -f out/external-modules.paths ]; then
            cp out/external-modules.paths "$artifact_dir/"
          fi
          if [ -f out/external-modules.names ]; then
            cp out/external-modules.names "$artifact_dir/"
          fi
          if [ -d "$GITHUB_WORKSPACE/sm8450-modules" ]; then
            find "$GITHUB_WORKSPACE/sm8450-modules" -type f -name '*.ko' -printf 'sm8450-modules/%P\n' \
              | sort > "$artifact_dir/external-built-modules.paths"
            find "$GITHUB_WORKSPACE/sm8450-modules" -type f -name '*.ko' -printf '%f\n' \
              | sort > "$artifact_dir/external-built-modules.names"
          fi
          find "$artifact_dir" -type f -printf '%P\t%s bytes\n' | sort > "$artifact_dir/MANIFEST.txt"

          cd "$GITHUB_WORKSPACE/artifacts"
          zip -r9 "${artifact_slug}-diagnostic.zip" "${artifact_slug}-diagnostic"

      - name: Package rebuilt modules
        run: |
          set -euo pipefail
          cd kernel-src
          artifact_slug="${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}"
          modules_dir="$GITHUB_WORKSPACE/artifacts/${artifact_slug}-modules"
          rm -rf "$modules_dir"
          mkdir -p "$modules_dir/lib/modules"
          module_search_roots=(out)
          if [ -d "$GITHUB_WORKSPACE/sm8450-modules" ]; then
            module_search_roots+=("$GITHUB_WORKSPACE/sm8450-modules")
          fi
          find "${module_search_roots[@]}" -type f -name '*.ko' -exec cp -t "$modules_dir/lib/modules" {} +
          if command -v llvm-strip >/dev/null; then
            find "$modules_dir/lib/modules" -type f -name '*.ko' -print0 \
              | xargs -0 -r llvm-strip --strip-debug
          else
            echo "::warning::llvm-strip not found; rebuilt modules artifact will keep debug sections."
          fi
          find "$modules_dir/lib/modules" -type f -name '*.ko' -printf '%f\n' | sort > "$modules_dir/built-modules.names"
          {
            find out -type f -name '*.ko' -printf 'out/%P\n'
            if [ -d "$GITHUB_WORKSPACE/sm8450-modules" ]; then
              find "$GITHUB_WORKSPACE/sm8450-modules" -type f -name '*.ko' -printf 'sm8450-modules/%P\n'
            fi
          } | sort > "$modules_dir/built-modules.paths"
          if [ -f out/Module.symvers ]; then
            cp out/Module.symvers "$modules_dir/"
          fi
          if [ -f out/modules.order ]; then
            cp out/modules.order "$modules_dir/"
          fi
          find "$modules_dir" -type f -printf '%P\t%s bytes\n' | sort > "$modules_dir/MANIFEST.txt"

          cd "$GITHUB_WORKSPACE/artifacts"
          zip -r9 "${artifact_slug}-modules.zip" "${artifact_slug}-modules"

      - name: Package Lineage AnyKernel3 flashable zip
        run: |
          set -euo pipefail
          device="${{ inputs.device }}"
          profile="${{ inputs.profile }}"
          lto_mode="${{ inputs.lto_mode }}"
          toolchain="${{ inputs.toolchain }}"
          kernel_name="${{ inputs.kernel_name }}"
          artifact_slug="${kernel_name}-${device}-${profile}-${toolchain}-${lto_mode}"
          flashable_zip="$GITHUB_WORKSPACE/artifacts/${artifact_slug}-lineage-anykernel3.zip"

          rm -rf "$GITHUB_WORKSPACE/anykernel"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$GITHUB_WORKSPACE/anykernel"
          rm -rf "$GITHUB_WORKSPACE/anykernel/.git" "$GITHUB_WORKSPACE/anykernel/.github"
          cp "$GITHUB_WORKSPACE/kernel-src/out/arch/arm64/boot/Image" "$GITHUB_WORKSPACE/anykernel/Image"

          cat > "$GITHUB_WORKSPACE/anykernel/anykernel.sh" <<EOF
          #!/sbin/sh
          #
          # AnyKernel3 script for LineageOS 23.2 on Xiaomi 12 Pro (zeus).

          properties() { '
          kernel.string=${kernel_name} ${profile}/${toolchain}/${lto_mode} for LineageOS 23.2 (${device})
          do.devicecheck=1
          do.modules=0
          do.systemless=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=${device}
          device.name2=Xiaomi 12 Pro
          supported.versions=
          supported.patchlevels=
          '; }

          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;

          . tools/ak3-core.sh;

          dump_boot;
          write_boot;
          EOF

          cd "$GITHUB_WORKSPACE/anykernel"
          zip -r9 "$flashable_zip" . \
            -x '*.git*' -x 'README.md' -x '*placeholder*'

      - name: Upload Lineage flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-lineage-anykernel3
          path: artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-lineage-anykernel3.zip
          retention-days: 7

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-diagnostic
          path: artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-diagnostic.zip
          retention-days: 7

      - name: Upload rebuilt modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-modules
          path: artifacts/${{ inputs.kernel_name }}-${{ inputs.device }}-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}-modules.zip
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lineage-zeus-build-log-${{ inputs.profile }}-${{ inputs.toolchain }}-${{ inputs.lto_mode }}
